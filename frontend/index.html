  <body class="ethereal-gradient">
    <div id="root"></div>
    <div class="moving-blob" style="top: -100px; left: -100px;"></div>
    <div class="moving-blob" style="bottom: -100px; right: -100px; animation-delay: -5s;"></div>
    
    <script type="module" src="/index.tsx"></script>

    <script>
      /**
       * Service Worker Registration with robust handling for cloud sandboxes.
       */
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Detect sandbox environments to prevent origin errors (e.g. ai.studio or Google internal domains)
          const isSandbox = window.location.hostname.includes('goog') || window.location.hostname.includes('ai.studio');
          
          if (isSandbox) {
            console.info('Service Worker registration skipped in sandbox environment.');
            return;
          }

          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('PWA Service Worker Registered', reg.scope))
            .catch(err => {
               // Only log as info if it's a common origin restriction in certain cloud previews
               if (err.message.includes('origin') || err.message.includes('ServiceWorker')) {
                 console.info('Service Worker registration skipped or restricted.');
               } else {
                 console.error('PWA Service Worker Failed:', err);
               }
            });
        });
      }
    </script>
  </body>
</html>
